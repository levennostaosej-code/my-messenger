<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0b0b0b; color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #app { width: 100%; max-width: 500px; height: 100vh; max-height: 800px; background: #1a1a1a; display: flex; flex-direction: column; border-radius: 20px; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.9); position: relative; }
        #login { padding: 20px; display: flex; flex-direction: column; gap: 15px; justify-content: center; align-items: center; height: 100%; }
        #login input { padding: 15px; border-radius: 30px; border: none; background: #2a2a2a; color: #fff; font-size: 16px; width: 80%; text-align: center; outline: 2px solid #333; }
        #login input:focus { outline: 2px solid #007bff; }
        #login button { padding: 15px 30px; border-radius: 30px; border: none; background: #007bff; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; width: 80%; transition: 0.2s; }
        #login button:hover { background: #0056b3; }
        #chat-container { display: none; flex-direction: column; height: 100%; }
        #header { padding: 15px; background: #222; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; flex-shrink: 0; }
        #header span { font-size: 18px; font-weight: bold; }
        #header button { background: #dc3545; border: none; color: #fff; padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 14px; }
        #main { display: flex; flex: 1; overflow: hidden; }
        #chats-list { width: 35%; background: #141414; border-right: 1px solid #2a2a2a; overflow-y: auto; padding: 10px 0; flex-shrink: 0; }
        #chats-list .chat-item { padding: 12px 15px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; }
        #chats-list .chat-item:hover { background: #2a2a2a; }
        #chats-list .chat-item.active { background: #2a2a2a; border-left: 3px solid #007bff; }
        #chats-list .chat-item .avatar { width: 40px; height: 40px; border-radius: 50%; background: #007bff; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        #chats-list .chat-item .info { flex: 1; overflow: hidden; }
        #chats-list .chat-item .info .name { font-size: 14px; font-weight: 500; }
        #chats-list .chat-item .info .last-msg { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #chats-list .chat-item .time { font-size: 10px; color: #555; flex-shrink: 0; }
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #1a1a1a; }
        #chat-header { padding: 12px 15px; background: #222; border-bottom: 1px solid #333; font-size: 16px; font-weight: bold; flex-shrink: 0; display: flex; align-items: center; gap: 10px; }
        #chat-header .avatar { width: 32px; height: 32px; border-radius: 50%; background: #007bff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 8px 14px; border-radius: 18px; word-wrap: break-word; font-size: 15px; line-height: 1.4; }
        .msg.from-me { background: #007bff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.from-other { background: #2d2d2d; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.system { background: #333; align-self: center; font-size: 12px; color: #aaa; padding: 4px 12px; border-radius: 20px; max-width: 90%; }
        .msg .name { font-size: 12px; color: #aaa; margin-bottom: 2px; }
        .msg .time { font-size: 10px; color: #888; margin-top: 3px; text-align: right; }
        #input-area { display: flex; padding: 10px; background: #141414; gap: 10px; flex-shrink: 0; border-top: 1px solid #2a2a2a; }
        #input-area input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: #2a2a2a; color: #fff; font-size: 15px; outline: none; }
        #input-area input:focus { outline: 2px solid #007bff; }
        #input-area button { padding: 10px 18px; border-radius: 25px; border: none; background: #007bff; color: #fff; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        #input-area button:hover { background: #0056b3; }
        .floating-btn { position: absolute; bottom: 20px; left: 20px; background: #28a745; color: #fff; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.2s; z-index: 10; }
        .floating-btn:hover { transform: scale(1.1); }
        #group-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; flex-direction: column; gap: 15px; padding: 20px; }
        #group-modal .modal-content { background: #1a1a1a; border-radius: 20px; padding: 25px; width: 90%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; }
        #group-modal input { padding: 12px; border-radius: 20px; border: none; background: #2a2a2a; color: #fff; font-size: 16px; outline: 2px solid #333; }
        #group-modal input:focus { outline: 2px solid #007bff; }
        #group-modal .member-select { display: flex; flex-wrap: wrap; gap: 8px; max-height: 150px; overflow-y: auto; padding: 10px; background: #141414; border-radius: 10px; }
        #group-modal .member-select label { display: flex; align-items: center; gap: 8px; font-size: 14px; background: #2a2a2a; padding: 5px 12px; border-radius: 15px; cursor: pointer; }
        #group-modal .member-select input[type="checkbox"] { accent-color: #007bff; }
        #group-modal .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        #group-modal .modal-buttons button { padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        #group-modal .modal-buttons .cancel-btn { background: #555; color: #fff; }
        #group-modal .modal-buttons .create-btn { background: #007bff; color: #fff; }
        @media (max-width: 600px) { #app { max-height: 100vh; border-radius: 0; } #chats-list { width: 40%; } }
    </style>
</head>
<body>
<div id="app">
    <div id="login">
        <h2>🔐 Вход</h2>
        <input id="name-input" placeholder="Введите ваше имя" maxlength="20">
        <button id="login-btn">Войти</button>
    </div>
    <div id="chat-container">
        <div id="header">
            <span id="my-name-display">👤 </span>
            <button id="logout-btn">Выйти</button>
        </div>
        <div id="main">
            <div id="chats-list"></div>
            <div id="chat-area">
                <div id="chat-header"><div class="avatar" id="chat-avatar">💬</div><span id="chat-title">Общий чат</span></div>
                <div id="messages"></div>
                <div id="input-area">
                    <input id="msg-input" placeholder="Сообщение..." disabled>
                    <button id="send-btn" disabled>➤</button>
                </div>
            </div>
        </div>
        <button class="floating-btn" id="create-group-btn">➕</button>
    </div>
    <div id="group-modal">
        <div class="modal-content">
            <h3>Создать группу</h3>
            <input id="group-name-input" placeholder="Название группы">
            <div class="member-select" id="member-select"></div>
            <div class="modal-buttons">
                <button class="cancel-btn" id="group-cancel-btn">Отмена</button>
                <button class="create-btn" id="group-create-btn">Создать</button>
            </div>
        </div>
    </div>
</div>
<script>
    // ---- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----
    let socket = null;
    let myName = '';
    let currentChat = 'all';
    let allMessages = [];
    let groups = {};
    let usersOnline = [];
    const chats = {};

    // DOM
    const loginDiv = document.getElementById('login');
    const chatContainer = document.getElementById('chat-container');
    const nameInput = document.getElementById('name-input');
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const chatsList = document.getElementById('chats-list');
    const messagesDiv = document.getElementById('messages');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const chatTitle = document.getElementById('chat-title');
    const chatAvatar = document.getElementById('chat-avatar');
    const myNameDisplay = document.getElementById('my-name-display');
    const createGroupBtn = document.getElementById('create-group-btn');
    const groupModal = document.getElementById('group-modal');
    const groupNameInput = document.getElementById('group-name-input');
    const memberSelect = document.getElementById('member-select');
    const groupCancelBtn = document.getElementById('group-cancel-btn');
    const groupCreateBtn = document.getElementById('group-create-btn');

    // ---- ВХОД ----
    loginBtn.onclick = () => {
        const name = nameInput.value.trim();
        if (!name) return alert('Введите имя');
        myName = name;
        loginDiv.style.display = 'none';
        chatContainer.style.display = 'flex';
        myNameDisplay.textContent = '👤 ' + myName;
        connectSocket();
    };
    nameInput.onkeydown = (e) => { if (e.key === 'Enter') loginBtn.click(); };

    // ---- ПОДКЛЮЧЕНИЕ ----
    function connectSocket() {
        socket = io();
        socket.on('connect', () => {
            socket.emit('register', myName);
            msgInput.disabled = false;
            sendBtn.disabled = false;
        });
        socket.on('users', (users) => {
            usersOnline = users.filter(u => u !== myName);
            renderChats();
        });
        socket.on('groups_list', (g) => {
            groups = g;
            renderChats();
        });
        socket.on('history', (history) => {
            allMessages = history;
            renderMessages();
        });
        socket.on('message', (msg) => {
            allMessages.push(msg);
            renderMessages();
            renderChats();
        });
        socket.on('disconnect', () => {
            msgInput.disabled = true;
            sendBtn.disabled = true;
        });
    }

    // ---- ОТРИСОВКА СПИСКА ЧАТОВ ----
    function renderChats() {
        chatsList.innerHTML = '';
        // Общий чат
        addChatItem('all', '💬 Общий чат', 'all');
        // Личные чаты с онлайн-пользователями
        usersOnline.forEach(name => {
            addChatItem(name, name, 'user');
        });
        // Группы
        Object.values(groups).forEach(group => {
            if (group.members.includes(myName)) {
                addChatItem(group.id, '👥 ' + group.name, 'group');
            }
        });
        // Подсветка активного чата
        document.querySelectorAll('.chat-item').forEach(el => {
            if (el.dataset.chatId === currentChat) {
                el.classList.add('active');
            }
        });
    }

    function addChatItem(chatId, name, type) {
        const div = document.createElement('div');
        div.className = 'chat-item';
        div.dataset.chatId = chatId;
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = type === 'all' ? '💬' : type === 'group' ? '👥' : name.charAt(0).toUpperCase();
        const info = document.createElement('div');
        info.className = 'info';
        const nameSpan = document.createElement('div');
        nameSpan.className = 'name';
        nameSpan.textContent = name;
        const lastMsg = document.createElement('div');
        lastMsg.className = 'last-msg';
        const last = getLastMessage(chatId);
        lastMsg.textContent = last ? last.text : 'Нет сообщений';
        info.appendChild(nameSpan);
        info.appendChild(lastMsg);
        div.appendChild(avatar);
        div.appendChild(info);
        div.onclick = () => {
            currentChat = chatId;
            renderChats();
            renderMessages();
            updateChatHeader();
        };
        chatsList.appendChild(div);
    }

    function getLastMessage(chatId) {
        const filtered = allMessages.filter(m => m.chatId === chatId);
        return filtered.length > 0 ? filtered[filtered.length - 1] : null;
    }

    // ---- ОБНОВЛЕНИЕ ХЕДЕРА ЧАТА ----
    function updateChatHeader() {
        let title = 'Общий чат';
        let avatarText = '💬';
        if (currentChat === 'all') { title = 'Общий чат'; avatarText = '💬'; }
        else if (currentChat.startsWith('group_')) {
            const group = groups[currentChat];
            if (group) { title = '👥 ' + group.name; avatarText = '👥'; }
        } else {
            title = currentChat;
            avatarText = currentChat.charAt(0).toUpperCase();
        }
        chatTitle.textContent = title;
        chatAvatar.textContent = avatarText;
    }

    // ---- ОТРИСОВКА СООБЩЕНИЙ ----
    function renderMessages() {
        messagesDiv.innerHTML = '';
        const filtered = allMessages.filter(m => m.chatId === currentChat);
        if (filtered.length === 0) {
            const empty = document.createElement('div');
            empty.textContent = 'Нет сообщений';
            empty.style.color = '#555';
            empty.style.textAlign = 'center';
            empty.style.padding = '20px';
            messagesDiv.appendChild(empty);
            return;
        }
        filtered.forEach(msg => {
            const div = document.createElement('div');
            if (msg.from === 'system') {
                div.className = 'msg system';
                div.textContent = msg.text;
            } else {
                div.className = `msg ${msg.from === myName ? 'from-me' : 'from-other'}`;
                div.innerHTML = `
                    <div class="name">${msg.from}</div>
                    <div>${msg.text}</div>
                    <div class="time">${msg.time}</div>
                `;
            }
            messagesDiv.appendChild(div);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        updateChatHeader();
    }

    // ---- ОТПРАВКА СООБЩЕНИЙ ----
    sendBtn.onclick = sendMessage;
    msgInput.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };
    function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || !socket) return;
        socket.emit('message', { to: currentChat, text: text });
        msgInput.value = '';
    }

    // ---- ВЫХОД ----
    logoutBtn.onclick = () => { if (socket) socket.disconnect(); location.reload(); };

    // ---- СОЗДАНИЕ ГРУППЫ ----
    createGroupBtn.onclick = () => {
        groupModal.style.display = 'flex';
        memberSelect.innerHTML = '';
        // Добавляем всех пользователей онлайн (кроме себя)
        usersOnline.forEach(name => {
            const label = document.createElement('label');
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = name;
            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(name));
            memberSelect.appendChild(label);
        });
        if (usersOnline.length === 0) {
            const empty = document.createElement('div');
            empty.textContent = 'Нет онлайн-пользователей';
            empty.style.color = '#555';
            empty.style.padding = '10px';
            memberSelect.appendChild(empty);
        }
        groupNameInput.value = '';
    };
    groupCancelBtn.onclick = () => { groupModal.style.display = 'none'; };
    groupCreateBtn.onclick = () => {
        const name = groupNameInput.value.trim() || 'Новая группа';
        const members = [];
        memberSelect.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
            members.push(cb.value);
        });
        if (members.length === 0) {
            alert('Выберите хотя бы одного участника');
            return;
        }
        socket.emit('create_group', { name, members });
        groupModal.style.display = 'none';
    };

    // ---- ПЕРЕХОД НА ГРУППЫ ПОСЛЕ СОЗДАНИЯ ----
    socket.on('groups_list', (g) => {
        groups = g;
        renderChats();
    });

    // ---- ИНИЦИАЛИЗАЦИЯ ----
    renderChats();
    updateChatHeader();
</script>
</body>
</html>
