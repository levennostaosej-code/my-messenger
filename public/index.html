<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #0b0b0b;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        #app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }
        #login {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        #login input {
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: #2a2a2a;
            color: #fff;
            font-size: 16px;
            width: 80%;
            text-align: center;
            outline: 2px solid #333;
        }
        #login input:focus {
            outline: 2px solid #007bff;
        }
        #login button {
            padding: 15px 30px;
            border-radius: 30px;
            border: none;
            background: #007bff;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 80%;
            transition: 0.2s;
        }
        #login button:hover {
            background: #0056b3;
        }
        #chat-container {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        #header {
            padding: 15px;
            background: #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }
        #header span {
            font-size: 18px;
            font-weight: bold;
        }
        #header button {
            background: #dc3545;
            border: none;
            color: #fff;
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
        }
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        #users-list {
            width: 30%;
            background: #141414;
            border-right: 1px solid #2a2a2a;
            overflow-y: auto;
            padding: 10px 0;
            flex-shrink: 0;
        }
        #users-list div {
            padding: 10px 15px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid #222;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #users-list div:hover {
            background: #2a2a2a;
        }
        #users-list .online {
            color: #4caf50;
            font-size: 12px;
        }
        #users-list .call-btn {
            background: #28a745;
            border: none;
            color: #fff;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #users-list .call-btn:hover {
            background: #218838;
        }
        #chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
        }
        #messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .msg {
            max-width: 80%;
            padding: 8px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }
        .msg.from-me {
            background: #007bff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .msg.from-other {
            background: #2d2d2d;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .msg .name {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 2px;
        }
        .msg .time {
            font-size: 10px;
            color: #888;
            margin-top: 3px;
            text-align: right;
        }
        #input-area {
            display: flex;
            padding: 10px;
            background: #141414;
            gap: 10px;
            flex-shrink: 0;
            border-top: 1px solid #2a2a2a;
        }
        #input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: none;
            background: #2a2a2a;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        #input-area input:focus {
            outline: 2px solid #007bff;
        }
        #input-area button {
            padding: 10px 18px;
            border-radius: 25px;
            border: none;
            background: #007bff;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        #input-area button:hover {
            background: #0056b3;
        }
        #current-chat {
            padding: 10px 15px;
            background: #222;
            border-bottom: 1px solid #333;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }
        @media (max-width: 600px) {
            #app {
                max-height: 100vh;
                border-radius: 0;
            }
            #users-list {
                width: 35%;
            }
        }
        /* Стили для звонка */
        #call-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        #call-overlay video {
            width: 80%;
            max-height: 50%;
            border-radius: 15px;
            background: #000;
        }
        #call-overlay button {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        #call-overlay .end-call {
            background: #dc3545;
            color: #fff;
        }
        #call-overlay .answer-call {
            background: #28a745;
            color: #fff;
        }
    </style>
</head>
<body>
<div id="app">
    <div id="login">
        <h2>🔐 Вход</h2>
        <input id="name-input" placeholder="Введите ваше имя" maxlength="20">
        <button id="login-btn">Войти</button>
    </div>
    <div id="chat-container">
        <div id="header">
            <span id="my-name-display">👤 </span>
            <button id="logout-btn">Выйти</button>
        </div>
        <div id="main">
            <div id="users-list">
                <div style="color:#888; font-size:12px; text-align:center; padding:10px;">Онлайн</div>
            </div>
            <div id="chat-area">
                <div id="current-chat">💬 Общий чат</div>
                <div id="messages"></div>
                <div id="input-area">
                    <input id="msg-input" placeholder="Сообщение..." disabled>
                    <button id="send-btn" disabled>➤</button>
                </div>
            </div>
        </div>
    </div>
    <div id="call-overlay">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted style="width:120px; position:absolute; bottom:20px; right:20px; border-radius:10px;"></video>
        <div style="display:flex; gap:15px;">
            <button class="end-call" id="end-call-btn">🔴 Завершить</button>
        </div>
    </div>
</div>
<script>
    // ---- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----
    let socket = null;
    let myName = '';
    let currentChat = 'all';
    let users = {};
    let allMessages = [];

    // Переменные для звонков
    let peerConnection = null;
    let localStream = null;
    let remoteStream = null;
    let callTarget = null;
    let isCaller = false;

    // DOM элементы
    const loginDiv = document.getElementById('login');
    const chatContainer = document.getElementById('chat-container');
    const nameInput = document.getElementById('name-input');
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const usersList = document.getElementById('users-list');
    const messagesDiv = document.getElementById('messages');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const currentChatSpan = document.getElementById('current-chat');
    const myNameDisplay = document.getElementById('my-name-display');
    const callOverlay = document.getElementById('call-overlay');
    const remoteVideo = document.getElementById('remote-video');
    const localVideo = document.getElementById('local-video');
    const endCallBtn = document.getElementById('end-call-btn');

    // ---- ВХОД ----
    loginBtn.onclick = () => {
        const name = nameInput.value.trim();
        if (!name) return alert('Введите имя');
        myName = name;
        loginDiv.style.display = 'none';
        chatContainer.style.display = 'flex';
        myNameDisplay.textContent = '👤 ' + myName;
        connectSocket();
    };

    nameInput.onkeydown = (e) => {
        if (e.key === 'Enter') loginBtn.click();
    };

    // ---- ПОДКЛЮЧЕНИЕ К СЕРВЕРУ ----
    function connectSocket() {
        socket = io();

        socket.on('connect', () => {
            socket.emit('register', myName);
            msgInput.disabled = false;
            sendBtn.disabled = false;
        });

        socket.on('users', (userList) => {
            users = {};
            userList.forEach(name => {
                if (name !== myName) users[name] = true;
            });
            renderUsers();
        });

        socket.on('history', (history) => {
            allMessages = history;
            renderMessages();
        });

        socket.on('message', (msg) => {
            allMessages.push(msg);
            renderMessages();
        });

        // ---- ОБРАБОТКА ЗВОНКОВ ----
        socket.on('call', (data) => {
            if (data.from === myName) return;
            callTarget = data.from;
            isCaller = false;
            // Показываем входящий звонок
            if (confirm(`📞 Входящий звонок от ${data.from}. Ответить?`)) {
                acceptCall(data.signal);
            } else {
                // Отклоняем
                socket.emit('answer', { to: data.from, signal: 'reject' });
            }
        });

        socket.on('answer', (data) => {
            if (data.signal === 'reject') {
                alert('Звонок отклонён');
                endCall();
                return;
            }
            if (peerConnection) {
                const desc = new RTCSessionDescription(data.signal);
                peerConnection.setRemoteDescription(desc);
            }
        });

        socket.on('disconnect', () => {
            msgInput.disabled = true;
            sendBtn.disabled = true;
        });
    }

    // ---- ОТРИСОВКА ПОЛЬЗОВАТЕЛЕЙ ----
    function renderUsers() {
        usersList.innerHTML = '<div style="color:#888; font-size:12px; text-align:center; padding:10px;">Онлайн</div>';
        // Общий чат
        const allChat = document.createElement('div');
        allChat.textContent = '💬 Общий чат';
        allChat.style.fontWeight = currentChat === 'all' ? 'bold' : 'normal';
        allChat.style.background = currentChat === 'all' ? '#2a2a2a' : 'transparent';
        allChat.onclick = () => {
            currentChat = 'all';
            currentChatSpan.textContent = '💬 Общий чат';
            renderMessages();
            renderUsers();
        };
        usersList.appendChild(allChat);

        // Пользователи
        Object.keys(users).forEach(name => {
            const div = document.createElement('div');
            div.innerHTML = `
                <span>${name}</span>
                <span style="display:flex; gap:5px;">
                    <span class="online">●</span>
                    <button class="call-btn" data-user="${name}">📞</button>
                </span>
            `;
            if (currentChat === name) {
                div.style.background = '#2a2a2a';
                div.style.fontWeight = 'bold';
            }
            div.onclick = (e) => {
                if (e.target.tagName === 'BUTTON') return;
                currentChat = name;
                currentChatSpan.textContent = `💬 ${name}`;
                renderMessages();
                renderUsers();
            };
            // Кнопка звонка
            const callBtn = div.querySelector('.call-btn');
            callBtn.onclick = (e) => {
                e.stopPropagation();
                startCall(name);
            };
            usersList.appendChild(div);
        });
    }

    // ---- ОТРИСОВКА СООБЩЕНИЙ ----
    function renderMessages() {
        messagesDiv.innerHTML = '';
        const filtered = allMessages.filter(msg => {
            if (currentChat === 'all') return msg.to === 'all';
            return (msg.from === currentChat && msg.to === myName) ||
                   (msg.from === myName && msg.to === currentChat);
        });
        if (filtered.length === 0) {
            const empty = document.createElement('div');
            empty.textContent = 'Нет сообщений';
            empty.style.color = '#555';
            empty.style.textAlign = 'center';
            empty.style.padding = '20px';
            messagesDiv.appendChild(empty);
            return;
        }
        filtered.forEach(msg => {
            const div = document.createElement('div');
            div.className = `msg ${msg.from === myName ? 'from-me' : 'from-other'}`;
            div.innerHTML = `
                <div class="name">${msg.from}</div>
                <div>${msg.text}</div>
                <div class="time">${msg.time}</div>
            `;
            messagesDiv.appendChild(div);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // ---- ОТПРАВКА СООБЩЕНИЙ ----
    sendBtn.onclick = sendMessage;
    msgInput.onkeydown = (e) => {
        if (e.key === 'Enter') sendMessage();
    };

    function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || !socket) return;
        socket.emit('message', {
            to: currentChat,
            text: text
        });
        msgInput.value = '';
    }

    // ---- ВЫХОД ----
    logoutBtn.onclick = () => {
        if (socket) socket.disconnect();
        location.reload();
    };

    // ---- ЗВОНКИ (WebRTC) ----
    const servers = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' }
        ]
    };

    async function startCall(target) {
        if (callTarget) return;
        callTarget = target;
        isCaller = true;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = localStream;
            peerConnection = new RTCPeerConnection(servers);
            peerConnection.onicecandidate = (e) => {
                if (e.candidate) {
                    socket.emit('call', {
                        to: callTarget,
                        signal: { type: 'candidate', candidate: e.candidate }
                    });
                }
            };
            peerConnection.ontrack = (e) => {
                remoteStream = e.streams[0];
                remoteVideo.srcObject = remoteStream;
                callOverlay.style.display = 'flex';
            };
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('call', {
                to: callTarget,
                signal: { type: 'offer', sdp: offer.sdp }
            });
            callOverlay.style.display = 'flex';
        } catch (e) {
            alert('Не удалось получить доступ к камере/микрофону');
        }
    }

    async function acceptCall(offerSignal) {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = localStream;
            peerConnection = new RTCPeerConnection(servers);
            peerConnection.onicecandidate = (e) => {
                if (e.candidate) {
                    socket.emit('answer', {
                        to: callTarget,
                        signal: { type: 'candidate', candidate: e.candidate }
                    });
                }
            };
            peerConnection.ontrack = (e) => {
                remoteStream = e.streams[0];
                remoteVideo.srcObject = remoteStream;
                callOverlay.style.display = 'flex';
            };
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            await peerConnection.setRemoteDescription(offerSignal);
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', {
                to: callTarget,
                signal: { type: 'answer', sdp: answer.sdp }
            });
            callOverlay.style.display = 'flex';
        } catch (e) {
            alert('Ошибка при ответе на звонок');
            endCall();
        }
    }

    function endCall() {
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        if (remoteStream) {
            remoteStream.getTracks().forEach(t => t.stop());
            remoteStream = null;
        }
        localVideo.srcObject = null;
        remoteVideo.srcObject = null;
        callOverlay.style.display = 'none';
        callTarget = null;
        isCaller = false;
    }

    endCallBtn.onclick = endCall;

    // ---- ОБРАБОТКА КАНДИДАТОВ ICE ----
    socket.on('answer', (data) => {
        if (data.signal.type === 'candidate' && peerConnection) {
            const candidate = new RTCIceCandidate(data.signal.candidate);
            peerConnection.addIceCandidate(candidate);
        }
    });

    // ---- ПЕРЕХВАТ КАНДИДАТОВ ОТ СОБЕСЕДНИКА ----
    // Это уже обрабатывается в socket.on('answer') и socket.on('call')
    // Дополнительно обработаем входящие кандидаты
    socket.on('call', (data) => {
        if (data.signal.type === 'candidate' && peerConnection) {
            const candidate = new RTCIceCandidate(data.signal.candidate);
            peerConnection.addIceCandidate(candidate);
        }
    });

    // ---- ПРИ ОБНОВЛЕНИИ СТРАНИЦЫ ----
    window.onbeforeunload = () => {
        if (socket) socket.disconnect();
    };
</script>
</body>
</html>
